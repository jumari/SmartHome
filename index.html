<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skagata Pintar - GitHub Smart Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(30, 41, 59, 0.78);
      --panel-2: rgba(15, 23, 42, 0.58);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --on: #38bdf8;
      --on-glow: rgba(56, 189, 248, 0.36);
      --off: #475569;
      --ok: #10b981;
      --warn: #f59e0b;
      --bad: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Outfit", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 15%, rgba(56, 189, 248, 0.18), transparent 26rem),
        linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 680px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #e0f2fe;
      margin-bottom: 6px;
    }

    header p,
    .hint,
    .status-text {
      color: var(--muted);
      font-size: 14px;
    }

    .settings {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr auto;
      margin-bottom: 22px;
      padding: 14px;
    }

    .settings label {
      color: var(--muted);
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .settings input {
      width: 100%;
      min-height: 42px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 0 12px;
    }

    button {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      min-height: 42px;
      padding: 0 16px;
    }

    .save-token {
      align-self: end;
      background: var(--on);
      color: #082f49;
    }

    .hint {
      grid-column: 1 / -1;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 22px;
    }

    @media (max-width: 520px) {
      .container {
        padding: 20px;
      }

      .settings,
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 180px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .card.active {
      border-color: var(--on);
      box-shadow: 0 10px 24px var(--on-glow);
    }

    .card.pending {
      border-color: var(--warn);
    }

    .icon-wrapper {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      color: var(--muted);
    }

    .card.active .icon-wrapper {
      background: rgba(56, 189, 248, 0.14);
      color: var(--on);
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }

    .card-status {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 15px;
      min-height: 16px;
      text-transform: uppercase;
    }

    .card.active .card-status {
      color: var(--on);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 62px;
      height: 32px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background-color: var(--off);
      border-radius: 999px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 4px;
      top: 4px;
      background: white;
      border-radius: 999px;
      transition: transform 0.2s ease;
    }

    input:checked + .slider {
      background-color: var(--on);
    }

    input:checked + .slider:before {
      transform: translateX(30px);
    }

    input:disabled + .slider {
      cursor: wait;
      opacity: 0.7;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding-top: 18px;
      display: grid;
      gap: 10px;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      min-height: 20px;
      text-align: center;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--bad);
      flex: 0 0 auto;
    }

    .dot.online {
      background: var(--ok);
      box-shadow: 0 0 9px var(--ok);
    }

    .dot.pending {
      background: var(--warn);
      box-shadow: 0 0 9px var(--warn);
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>Skagata Pintar</h1>
      <p>Dashboard GitHub Pages untuk ESP32</p>
    </header>

    <section class="settings" aria-label="Pengaturan GitHub">
      <div>
        <label for="token">GitHub token lokal</label>
        <input id="token" type="password" autocomplete="off" placeholder="Fine-grained token: Contents read/write">
      </div>
      <button class="save-token" type="button" onclick="saveToken()">Simpan</button>
      <p class="hint">Token hanya disimpan di browser ini, bukan di file GitHub. Buat token dengan akses repository Contents: Read and write.</p>
    </section>

    <section class="grid" aria-label="Kontrol lampu">
      <article class="card" id="card-1">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1 .3 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        </div>
        <div class="card-title">Lampu Teras</div>
        <div class="card-status" id="status-1">Mati</div>
        <label class="switch">
          <input type="checkbox" id="switch-1" onchange="toggleLight(1)">
          <span class="slider"></span>
        </label>
      </article>

      <article class="card" id="card-2">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1 .3 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        </div>
        <div class="card-title">Lampu R. Tamu</div>
        <div class="card-status" id="status-2">Mati</div>
        <label class="switch">
          <input type="checkbox" id="switch-2" onchange="toggleLight(2)">
          <span class="slider"></span>
        </label>
      </article>

      <article class="card" id="card-3">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1 .3 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        </div>
        <div class="card-title">Lampu Kamar</div>
        <div class="card-status" id="status-3">Mati</div>
        <label class="switch">
          <input type="checkbox" id="switch-3" onchange="toggleLight(3)">
          <span class="slider"></span>
        </label>
      </article>

      <article class="card" id="card-4">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1 .3 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        </div>
        <div class="card-title">Lampu Dapur</div>
        <div class="card-status" id="status-4">Mati</div>
        <label class="switch">
          <input type="checkbox" id="switch-4" onchange="toggleLight(4)">
          <span class="slider"></span>
        </label>
      </article>
    </section>

    <footer class="footer">
      <div class="status-line">
        <div class="dot" id="status-dot"></div>
        <span class="status-text" id="connection-text">Menyiapkan koneksi GitHub...</span>
      </div>
    </footer>
  </main>

  <script>
    const config = {
      owner: "jumari",
      repo: "SmartHome",
      branch: "main",
      path: "status.json"
    };

    const apiUrl = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}`;
    const rawUrl = `https://raw.githubusercontent.com/${config.owner}/${config.repo}/${config.branch}/${config.path}`;
    const tokenKey = "skagata-github-token";

    let fileSha = "";
    let currentStates = { lampu1: false, lampu2: false, lampu3: false, lampu4: false };
    let pendingLamp = null;
    let pollTimer = null;

    function getToken() {
      return localStorage.getItem(tokenKey) || "";
    }

    function saveToken() {
      const input = document.getElementById("token");
      const token = input.value.trim();

      if (token) {
        localStorage.setItem(tokenKey, token);
        input.value = "";
        setStatus("Token tersimpan. Mengambil status dari GitHub...", "pending");
        fetchStates();
      } else {
        localStorage.removeItem(tokenKey);
        setStatus("Token dihapus. Mode baca saja aktif.", "pending");
        fetchStates();
      }
    }

    function setStatus(text, mode) {
      const dot = document.getElementById("status-dot");
      dot.classList.toggle("online", mode === "online");
      dot.classList.toggle("pending", mode === "pending");
      document.getElementById("connection-text").innerText = text;
    }

    function setSwitchesDisabled(disabled) {
      for (let i = 1; i <= 4; i += 1) {
        document.getElementById(`switch-${i}`).disabled = disabled;
      }
    }

    function setPendingCard(id, pending) {
      document.getElementById(`card-${id}`).classList.toggle("pending", pending);
      document.getElementById(`status-${id}`).innerText = pending ? "Menyimpan..." : (currentStates[`lampu${id}`] ? "Menyala" : "Mati");
    }

    function updateCardUI(id, state) {
      const card = document.getElementById(`card-${id}`);
      const status = document.getElementById(`status-${id}`);
      const sw = document.getElementById(`switch-${id}`);

      sw.checked = state;
      card.classList.toggle("active", state);
      card.classList.remove("pending");
      status.innerText = state ? "Menyala" : "Mati";
    }

    function applyStates(states) {
      currentStates = {
        lampu1: Boolean(states.lampu1),
        lampu2: Boolean(states.lampu2),
        lampu3: Boolean(states.lampu3),
        lampu4: Boolean(states.lampu4)
      };

      for (let i = 1; i <= 4; i += 1) {
        if (pendingLamp !== i) {
          updateCardUI(i, currentStates[`lampu${i}`]);
        }
      }
    }

    function encodeBase64(text) {
      return btoa(unescape(encodeURIComponent(text)));
    }

    function decodeBase64(text) {
      return decodeURIComponent(escape(atob(text.replace(/\s/g, ""))));
    }

    async function fetchStates() {
      if (pendingLamp !== null) {
        return;
      }

      try {
        const token = getToken();

        if (token) {
          const response = await fetch(`${apiUrl}?ref=${config.branch}&_=${Date.now()}`, {
            cache: "no-store",
            headers: {
              Authorization: `Bearer ${token}`,
              Accept: "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
            }
          });

          if (!response.ok) {
            throw new Error(`GitHub API menolak baca status (${response.status}). Cek token/repo/branch.`);
          }

          const data = await response.json();
          fileSha = data.sha;
          applyStates(JSON.parse(decodeBase64(data.content)));
          setStatus("Terhubung ke GitHub. Mode kontrol aktif.", "online");
        } else {
          const response = await fetch(`${rawUrl}?_=${Date.now()}`, { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`Gagal baca status publik (${response.status}).`);
          }

          applyStates(await response.json());
          setStatus("Terhubung ke GitHub. Isi token untuk mengubah lampu.", "online");
        }
      } catch (error) {
        console.error(error);
        setStatus(error.message, "offline");
      }
    }

    async function getLatestFile() {
      const token = getToken();
      const response = await fetch(`${apiUrl}?ref=${config.branch}&_=${Date.now()}`, {
        cache: "no-store",
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: "application/vnd.github+json",
          "X-GitHub-Api-Version": "2022-11-28"
        }
      });

      if (!response.ok) {
        throw new Error(`Gagal mengambil SHA terbaru (${response.status}).`);
      }

      const data = await response.json();
      fileSha = data.sha;
      return JSON.parse(decodeBase64(data.content));
    }

    async function toggleLight(id) {
      const token = getToken();
      const sw = document.getElementById(`switch-${id}`);
      const desiredState = sw.checked;
      const previousState = currentStates[`lampu${id}`];

      if (!token) {
        sw.checked = previousState;
        setStatus("Isi dan simpan GitHub token dulu supaya web bisa update status.json.", "offline");
        return;
      }

      pendingLamp = id;
      setSwitchesDisabled(true);
      currentStates[`lampu${id}`] = desiredState;
      updateCardUI(id, desiredState);
      setPendingCard(id, true);
      setStatus(`Menyimpan Lampu ${id} ke GitHub...`, "pending");

      try {
        const latestStates = await getLatestFile();
        latestStates[`lampu${id}`] = desiredState;

        const response = await fetch(apiUrl, {
          method: "PUT",
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: "application/vnd.github+json",
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28"
          },
          body: JSON.stringify({
            message: `Update lampu ${id}: ${desiredState ? "ON" : "OFF"}`,
            content: encodeBase64(JSON.stringify(latestStates, null, 2) + "\n"),
            sha: fileSha,
            branch: config.branch
          })
        });

        if (!response.ok) {
          const detail = await response.json().catch(() => ({}));
          throw new Error(detail.message || `Gagal memperbarui GitHub (${response.status}).`);
        }

        const result = await response.json();
        fileSha = result.content.sha;
        applyStates(latestStates);
        setStatus(`Lampu ${id} tersimpan di GitHub. ESP32 akan membaca update berikutnya.`, "online");
      } catch (error) {
        console.error(error);
        currentStates[`lampu${id}`] = previousState;
        updateCardUI(id, previousState);
        setStatus(error.message, "offline");
      } finally {
        pendingLamp = null;
        setSwitchesDisabled(false);
        window.setTimeout(fetchStates, 1200);
      }
    }

    window.addEventListener("load", () => {
      if (getToken()) {
        document.getElementById("token").placeholder = "Token sudah tersimpan di browser ini";
      }
      fetchStates();
      pollTimer = window.setInterval(fetchStates, 6000);
    });
  </script>
</body>
</html>
